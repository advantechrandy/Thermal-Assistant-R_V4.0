<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thermal Agent 小R</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 工業風變數與字體優化 - 綠色冷光主題 */
        :root {
            --bg-dark: #080d0a;
            --panel-bg: #0d1712;
            --border-color: #163323;
            --accent-orange: #00ff9d;
            --accent-green: #00ff9d;
            --msg-user: #132b1e;
            --msg-ai: #0b1a13;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            box-sizing: border-box;
        }

        /* 主容器 */
        .agent-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-orange);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 800px;
            height: 100%; 
            max-height: 900px;
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 聊天區塊滾動條優化 */
        .chat-box {
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #1f4731;
            border-radius: 3px;
        }
        .chat-box::-webkit-scrollbar-thumb:hover {
            background: var(--accent-orange);
        }

        /* 訊息氣泡 */
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 6px;
            line-height: 1.6;
            font-size: 0.9rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg-user {
            background-color: var(--msg-user);
            border: 1px solid #1f4731;
            border-right: 3px solid var(--accent-orange);
            margin-left: auto;
            color: #fff;
        }
        .msg-ai {
            background-color: var(--msg-ai);
            border: 1px solid #163323;
            border-left: 3px solid var(--accent-green);
            margin-right: auto;
            color: #88ffcc;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 輸入框與按鈕 */
        .industrial-input {
            background-color: #050907;
            border: 1px solid var(--border-color);
            color: white;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .industrial-input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 1px var(--accent-orange);
        }
        .send-btn {
            background-color: var(--accent-orange);
            color: #080d0a; 
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .send-btn:hover {
            background-color: #00cc7e;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.4);
        }

        /* 快捷問題標籤 */
        .quick-chip {
            background-color: #132b1e;
            border: 1px solid #1f4731;
            color: #88ccaa;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .quick-chip:hover {
            border-color: var(--accent-orange);
            color: white;
            box-shadow: 0 0 8px rgba(0, 255, 157, 0.2);
        }

        /* 打字游標動畫 */
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
            color: var(--accent-green);
            margin-left: 4px;
            font-size: 0.8rem;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* 隱藏原生滾動條(快捷列) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- 主程式介面 (Main App Container) -->
    <!-- ========================================== -->
    <div id="mainApp" class="agent-container">
        <!-- Header -->

請輸入你的問題，或直接點選下方的快捷問題，我將提供適合回覆建議。
如果你的問題沒被回覆，系統會自動整理問題給管理員藍迪，下一版會一起加進資料庫裡，謝謝啦。</div>

        <div class="p-4 bg-[#0d1712] border-t border-[#163323]">

                <button class="quick-chip" onclick="sendQuickQuestion('鋁擠製程介紹影片')">鋁擠製程介紹(含影片)</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="userInput"

                    placeholder="請輸入你的問題..."
                    autocomplete="off"
                    onkeydown="handleKeyPress(event)">
                <button onclick="handleSend()" class="send-btn px-6 py-3 rounded-sm font-bold tracking-widest text-sm flex items-center justify-center min-w-[80px]">
                    SEND
                </button>
            </div>

    </div>

    <!-- 移除了 Firebase，改為純前端原生 JavaScript -->
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        let isTyping = false; 
        
        // ==========================================
        // Google Apps Script (GAS) 拋送設定
        // ==========================================
        // 已經為您設定好您專屬的 Apps Script URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfIKX19ubKoH3ey_zWIRmWnZgviMNs4t0xzbeSwC5tVxxyE_E6W5MPkwdNVCTxQr155Q/exec';

        // 寫入 Google 試算表 (使用 100% 成功的 GET 方式)
        async function submitToGoogleSheet(question) {
            if (!GAS_URL || GAS_URL.includes("請將此處替換為")) {
                console.warn("GAS URL 尚未設定。");
                return;
            }
            try {
                // 既然網址測試成功，我們直接用 GET 方式把問題接在網址後面傳送，保證成功！
                const targetUrl = GAS_URL + '?question=' + encodeURIComponent(question);
                
                await fetch(targetUrl, {
                    method: 'GET',
                    mode: 'no-cors' // 依然加上 no-cors 避免前端報錯
                });
                
                console.log("未回覆問題已成功傳送至 Google 試算表！");
            } catch (e) {
                console.error("資料傳送失敗:", e);
            }
        }

        // ==========================================
        // UI & 知識庫邏輯
        // ==========================================
        function updateClock() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const clockEl = document.getElementById('realTimeClock');
            if(clockEl) clockEl.innerText = `[${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}]`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const knowledgeBase = [
            {
                keywords: ["模擬", "資料"],
                // 加入 a 標籤與 css 樣式。雙斜線路徑在字串中需要使用 '\\' 來避免跳脫。
                answer: "模擬需要資料如下，資料全部到齊確認OK後才能進行排程喔。\n1.回填廢熱表(EE/Power)，如下載連結: <a href='https://docs.google.com/spreadsheets/d/1ZNCjw0w1ElHVHm2Zcb1UZNgbpNfouEvX/edit?usp=drive_link&ouid=114028389622768722194&rtpof=true&sd=true' target='_blank' class='text-[var(--accent-orange)] underline hover:text-white transition-colors'>模擬廢熱表</a>\n2.廢熱表內零件datasheet(EE/Power)。\n3.廢熱表內零件位置圖(EE/Power)。\n4.系統環境溫度規格與噪音規格(PM)。"
            },
            {
                keywords: ["模擬", "需要什麼"],
                answer: "模擬需要資料如下，資料全部到齊確認OK後才能進行排程喔。\n1.回填廢熱表(EE/Power)，如下載連結: <a href='https://docs.google.com/spreadsheets/d/1ZNCjw0w1ElHVHm2Zcb1UZNgbpNfouEvX/edit?usp=drive_link&ouid=114028389622768722194&rtpof=true&sd=true' target='_blank' class='text-[var(--accent-orange)] underline hover:text-white transition-colors'>模擬廢熱表</a>\n2.廢熱表內零件datasheet(EE/Power)。\n3.廢熱表內零件位置圖(EE/Power)。\n4.系統環境溫度規格與噪音規格(PM)。"
            },
            {
                keywords: ["模擬", "排程"],
                answer: "模擬需要資料全部到齊後確認OK後，Thermal Team內部才能進行排程喔。\n目前thermal simulaiton五位工程師使用兩套，可能需要排隊，請洽對應thermal。"
            },
            {
                keywords: ["噪音", "計算"],
                answer: "噪音是一種複雜能量，因為環境/材質/位置/測試方式/頻率共鳴等等多樣條件不同，也因此，無法精確計算或是模擬，只能實測才有精確值。\n但有時系統開發初期確需要初步估計，沒有辦法中的辦法中，有個理想化簡易計算工具總比胡亂猜的好，以下是工具連結，如果使用上有問題，請詢問Thermal。\n<a href='https://advantechrandy.github.io/Tool-A013_V2.3/' target='_blank' class='text-[var(--accent-orange)] underline hover:text-white transition-colors'>初步Sound Pressure噪音計算Tool</a>"

            {

        window.handleKeyPress = function(event) {
            if (event.key === 'Enter' || event.keyCode === 13) window.handleSend();
        };

        window.sendQuickQuestion = function(text) {
            if (isTyping) return;
            userInput.value = text;
            window.handleSend();
        };

        window.handleSend = async function() {
            const text = userInput.value.trim();
            if (!text || isTyping) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            const answer = findAnswer(text);

            isTyping = true;
            await simulateTyping(answer);
            isTyping = false;
        };

        function findAnswer(userText) {
            const lowerText = userText.toLowerCase();
            for (let item of knowledgeBase) {
                if (item.keywords.every(kw => lowerText.includes(kw))) {
                    return item.answer;
                }
            }
            
            // 查無資料時，寫入 Google 試算表
            submitToGoogleSheet(userText);
            
            return `Sorry囉~ 小R目前無法回答這問題。\n不過別擔心，系統已經自動將沒被回覆的問題傳送給管理員藍迪，我們會盡速擴充進下一版知識庫，謝拉！`;
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col gap-1 w-full mt-4';
            
            if (sender === 'user') {
                wrapper.innerHTML = `
                    <span class="text-[13px] text-gray-200 mr-1 text-right">使用者</span>
                    <div class="msg-bubble msg-user">${escapeHTML(text)}</div>
                `;
            } else {
                wrapper.innerHTML = `
                    <span class="text-[13px] text-gray-200 ml-1">小R</span>
                    <div class="msg-bubble msg-ai typing-cursor"></div>
                `;
            }

            chatBox.appendChild(wrapper);
            scrollToBottom();
            return wrapper.querySelector('.msg-bubble'); 
        }

        async function simulateTyping(text) {
            const bubbleEle = appendMessage('', 'ai');
            await new Promise(resolve => setTimeout(resolve, 400));
            let currentHTML = '';
            for (let i = 0; i < text.length; i++) {
                if (text[i] === '<') {
                    let tagEnd = text.indexOf('>', i);
                    if (tagEnd !== -1) {
                        currentHTML += text.substring(i, tagEnd + 1);
                        i = tagEnd; 
                        bubbleEle.innerHTML = currentHTML;
                        continue; 
                    }
                }
                currentHTML += text[i] === '\n' ? '<br>' : text[i];
                bubbleEle.innerHTML = currentHTML;
                scrollToBottom();
                const typeSpeed = Math.floor(Math.random() * 20) + 10;
                await new Promise(resolve => setTimeout(resolve, typeSpeed));
            }
            bubbleEle.classList.remove('typing-cursor');
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.clearChat = function() {
            if(isTyping) return;
            chatBox.innerHTML = `
                <div class="flex flex-col gap-1 w-full">
                    <span class="text-[10px] text-gray-500 ml-1">SYSTEM_AGENT</span>
                    <div class="msg-bubble msg-ai">[系統提示] 對話紀錄已清除。請重新提問。</div>
                </div>
            `;
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // 鎖定滑鼠右鍵 (輸入框除外) - 不顯示提示
        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
            }
        }, false);
    </script>
